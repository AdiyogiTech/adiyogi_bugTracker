<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Adiyogi Bug Tracker - Login to manage your testing projects.">
    <title>Login | Adiyogi Bug Tracker</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #1a1d27;
            --bg-card: #1e2130;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0b0;
            --accent: #6366f1;
            --accent-glow: rgba(99,102,241,.25);
            --pink: #ec4899;
            --red: #ef4444;
            --green: #22c55e;
            --orange: #f59e0b;
            --border: rgba(255,255,255,.07);
            --font: 'Inter', system-ui, sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 15px; }
        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Background */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(99,102,241,.12) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(236,72,153,.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 60% 80%, rgba(99,102,241,.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .bg-particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        .bg-particles .dot { position: absolute; border-radius: 50%; background: var(--accent); opacity: .06; animation: float 20s infinite ease-in-out; }
        @keyframes float { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-50px) scale(1.15); } }

        /* Login Card */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            animation: fadeUp .5s ease;
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 36px;
            box-shadow: 0 32px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.04);
        }

        /* Header */
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo {
            display: block;
            max-width: 190px;
            height: auto;
            margin: 0 auto 20px;
            object-fit: contain;
        }
        .login-title {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        .login-subtitle {
            font-size: .82rem;
            color: var(--text-secondary);
        }

        /* Role Selector */
        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 24px;
        }
        .role-btn {
            padding: 14px 10px;
            border-radius: 14px;
            border: 2px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            cursor: pointer;
            font-family: var(--font);
            font-size: .85rem;
            font-weight: 600;
            transition: all .22s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .role-btn .material-icons-round { font-size: 1.8rem; }
        .role-btn:hover {
            border-color: rgba(99,102,241,.4);
            color: var(--text-primary);
            background: rgba(99,102,241,.06);
        }
        .role-btn.active {
            border-color: var(--accent);
            background: rgba(99,102,241,.12);
            color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* Form */
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: .8rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 7px;
            letter-spacing: .3px;
        }
        .input-wrap {
            position: relative;
        }
        .input-wrap .material-icons-round {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.15rem;
            color: var(--text-secondary);
            pointer-events: none;
        }
        .form-group input {
            width: 100%;
            padding: 12px 42px 12px 42px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: var(--font);
            font-size: .9rem;
            outline: none;
            transition: border .2s, box-shadow .2s;
        }
        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            padding: 4px;
            transition: color .2s;
            z-index: 2;
        }
        .password-toggle:hover { color: var(--text-primary); }

        /* Error message */
        .error-msg {
            display: none;
            background: rgba(239,68,68,.1);
            border: 1px solid rgba(239,68,68,.25);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: .82rem;
            color: var(--red);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .error-msg.hidden { display: none; }

        /* Login button */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), var(--pink));
            border: none;
            border-radius: 14px;
            color: #fff;
            font-family: var(--font);
            font-size: .95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .22s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(99,102,241,.3);
            margin-top: 6px;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 28px rgba(99,102,241,.4);
        }
        .btn-login:active { transform: translateY(0); }

        /* Hint box */
        .hint-box {
            margin-top: 22px;
            padding: 14px 16px;
            background: rgba(99,102,241,.06);
            border: 1px solid rgba(99,102,241,.12);
            border-radius: 12px;
            font-size: .78rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }
        .hint-box strong { color: var(--accent); }
        .hint-box .hint-role { font-weight: 700; color: var(--text-primary); margin-top: 6px; }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card { padding: 28px 22px; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-particles" id="bgParticles"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <img src="logo.png" alt="Adiyogi Technosoft" class="login-logo">
                <div class="login-title">Bug Tracker</div>
                <div class="login-subtitle">Sign in to your workspace</div>
            </div>

            <!-- Role Selector -->
            <div class="role-selector">
                <button class="role-btn active" id="roleHr" onclick="selectRole('hr')">
                    <span class="material-icons-round">admin_panel_settings</span>
                    HR Manager
                </button>
                <button class="role-btn" id="roleTester" onclick="selectRole('tester')">
                    <span class="material-icons-round">bug_report</span>
                    Tester
                </button>
            </div>

            <!-- Error Message -->
            <div class="error-msg hidden" id="errorMsg">
                <span class="material-icons-round" style="font-size:1rem;">error</span>
                <span id="errorText">Invalid credentials. Please try again.</span>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <!-- Name field (shown for both, pre-filled for HR) -->
                <div class="form-group" id="nameGroup">
                    <label for="nameInput" id="nameLabel">Full Name <span style="color:var(--red);">*</span></label>
                    <div class="input-wrap">
                        <span class="material-icons-round">person</span>
                        <input type="text" id="nameInput" placeholder="Enter your full name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="mobileInput">Mobile Number</label>
                    <div class="input-wrap">
                        <span class="material-icons-round">smartphone</span>
                        <input type="tel" id="mobileInput" placeholder="Enter mobile number" maxlength="10" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="passwordInput">Password</label>
                    <div class="input-wrap">
                        <span class="material-icons-round">lock</span>
                        <input type="password" id="passwordInput" placeholder="Enter password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <span class="material-icons-round" id="eyeIcon">visibility</span>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="material-icons-round">login</span>
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <script>
        let selectedRole = 'hr';

        const CREDENTIALS = {
            hr:     { mobile: '9876543210', password: 'AYT@1234',    defaultName: 'Himanshu Choudhary', roleLabel: 'HR Manager' },
            tester: { mobile: '1234567890', password: 'Tester@1234', defaultName: '',                   roleLabel: 'Tester' }
        };

        function selectRole(role) {
            selectedRole = role;
            document.getElementById('roleHr').classList.toggle('active', role === 'hr');
            document.getElementById('roleTester').classList.toggle('active', role === 'tester');
            document.getElementById('mobileInput').value = '';
            document.getElementById('passwordInput').value = '';
            document.getElementById('errorMsg').classList.add('hidden');

            const nameInput = document.getElementById('nameInput');
            const nameLabel = document.getElementById('nameLabel');

            if (role === 'hr') {
                nameInput.value = CREDENTIALS.hr.defaultName;
                nameInput.placeholder = 'HR Manager name';
                nameLabel.innerHTML = 'HR Manager Name <span style="color:var(--red);">*</span>';
            } else {
                nameInput.value = '';
                nameInput.placeholder = 'Enter your full name';
                nameLabel.innerHTML = 'Your Full Name <span style="color:var(--red);">*</span>';
            }
        }

        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const mobile = document.getElementById('mobileInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const nameEntered = document.getElementById('nameInput').value.trim();
            const cred = CREDENTIALS[selectedRole];
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');

            if (!nameEntered) {
                errorMsg.classList.remove('hidden');
                errorText.textContent = 'Please enter your name.';
                return;
            }

            if (mobile === cred.mobile && password === cred.password) {
                sessionStorage.setItem('ayt_role', selectedRole);
                sessionStorage.setItem('ayt_username', nameEntered);
                sessionStorage.setItem('ayt_user_role_label', cred.roleLabel);
                window.location.href = 'index.html';
            } else {
                errorMsg.classList.remove('hidden');
                if (mobile !== cred.mobile) {
                    errorText.textContent = 'Mobile number is incorrect.';
                } else {
                    errorText.textContent = 'Password is incorrect.';
                }
                document.getElementById('passwordInput').value = '';
            }
        }

        // Auth guard: redirect if already logged in
        if (sessionStorage.getItem('ayt_role')) {
            window.location.href = 'index.html';
        }

        // Pre-fill default state on page load
        selectRole('hr');

        // Particles animation
        function initParticles() {
            const container = document.getElementById('bgParticles');
            for (let i = 0; i < 12; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                const size = Math.random() * 8 + 4;
                dot.style.cssText = 'width:' + size + 'px;height:' + size + 'px;top:' + (Math.random()*100) + '%;left:' + (Math.random()*100) + '%;animation-duration:' + (Math.random()*15+10) + 's;animation-delay:' + (Math.random()*-20) + 's;';
                container.appendChild(dot);
            }
        }
        initParticles();
    </script>
</body>
</html>
